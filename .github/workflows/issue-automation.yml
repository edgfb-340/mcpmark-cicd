name: Issue Management Automation

on:
  issues:
    types: [opened, labeled]

jobs:
  issue-triage:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run issue triage
        uses: actions/github-script@v7
        with:
          script: |
            const { issue, repo, github } = context;
            const title = issue.title.toLowerCase();
            const body = issue.body ? issue.body.toLowerCase() : '';
            
            // Add initial needs-triage label
            await github.rest.issues.addLabels({
              owner: repo.owner,
              repo: repo.repo,
              issue_number: issue.number,
              labels: ['needs-triage']
            });
            
            // Determine category label
            let categoryLabel = null;
            if (title.includes('bug')) {
              categoryLabel = 'bug';
            } else if (title.includes('epic')) {
              categoryLabel = 'epic';
            } else if (title.includes('maintenance')) {
              categoryLabel = 'maintenance';
            }
            
            if (categoryLabel) {
              await github.rest.issues.addLabels({
                owner: repo.owner,
                repo: repo.repo,
                issue_number: issue.number,
                labels: [categoryLabel]
              });
            }
            
            // Determine priority label
            let priorityLabel = 'priority-medium'; // default
            
            // Check for critical keywords
            const criticalKeywords = ['critical', 'urgent', 'production', 'outage'];
            if (criticalKeywords.some(keyword => title.includes(keyword) || body.includes(keyword))) {
              priorityLabel = 'priority-critical';
            }
            // Check for high keywords
            else if (['important', 'high', 'blocking'].some(keyword => title.includes(keyword) || body.includes(keyword))) {
              priorityLabel = 'priority-high';
            }
            // Check for low keywords
            else if (['low', 'nice-to-have', 'minor'].some(keyword => title.includes(keyword) || body.includes(keyword))) {
              priorityLabel = 'priority-low';
            }
            
            await github.rest.issues.addLabels({
              owner: repo.owner,
              repo: repo.repo,
              issue_number: issue.number,
              labels: [priorityLabel]
            });

  task-breakdown:
    runs-on: ubuntu-latest
    needs: issue-triage
    permissions:
      issues: write
    if: ${{ contains(github.event.issue.labels.*.name, 'epic') || contains(github.event.issue.title, 'epic') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create epic subtasks
        uses: actions/github-script@v7
        with:
          script: |
            const { issue, repo, github } = context;
            const originalTitle = issue.title;
            const parentNumber = issue.number;
            
            // Subtask definitions
            const subtasks = [
              { name: 'Requirements Analysis', number: 1 },
              { name: 'Design and Architecture', number: 2 },
              { name: 'Implementation', number: 3 },
              { name: 'Testing and Documentation', number: 4 }
            ];
            
            // Create subtasks
            const subtaskNumbers = [];
            for (const subtask of subtasks) {
              const subtaskTitle = `[SUBTASK] ${originalTitle} - Task ${subtask.number}: ${subtask.name}`;
              const subtaskBody = `Related to #${parentNumber}`;
              
              const response = await github.rest.issues.create({
                owner: repo.owner,
                repo: repo.repo,
                title: subtaskTitle,
                body: subtaskBody,
                labels: ['enhancement', 'needs-review']
              });
              
              subtaskNumbers.push(response.data.number);
            }
            
            // Update parent issue with checklist
            const checklist = subtaskNumbers.map(num => `- [ ] Task ${num}: #${num}`).join('\n');
            const newBody = issue.body ? `${issue.body}\n\n## Epic Tasks\n${checklist}` : `## Epic Tasks\n${checklist}`;
            
            await github.rest.issues.update({
              owner: repo.owner,
              repo: repo.repo,
              issue_number: parentNumber,
              body: newBody
            });

  auto-response:
    runs-on: ubuntu-latest
    needs: [issue-triage, task-breakdown]
    permissions:
      issues: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run auto-response
        uses: actions/github-script@v7
        with:
          script: |
            const { issue, repo, github } = context;
            const author = issue.user.login;
            const labels = issue.labels.map(label => label.name);
            
            // Check if first time contributor in this repo
            const issuesByAuthor = await github.rest.issues.listForRepo({
              owner: repo.owner,
              repo: repo.repo,
              creator: author,
              state: 'all'
            });
            
            const isFirstTime = issuesByAuthor.data.length === 1; // Only this issue
            
            if (isFirstTime) {
              await github.rest.issues.addLabels({
                owner: repo.owner,
                repo: repo.repo,
                issue_number: issue.number,
                labels: ['first-time-contributor']
              });
            }
            
            // Determine response based on issue type
            let response = '';
            if (labels.includes('bug')) {
              response = 'Thank you for reporting this bug! Please review our Bug Report Guidelines for more information on how to help us resolve this issue efficiently.';
            } else if (labels.includes('epic')) {
              response = 'Thank you for submitting this epic feature request! Please review our Feature Request Process for more information on how we handle large feature implementations.';
            } else if (labels.includes('maintenance')) {
              response = 'Thank you for submitting this maintenance request! Please review our Maintenance Guidelines for more information on how we handle maintenance tasks.';
            }
            
            // Add welcome message if first time
            if (isFirstTime) {
              response = `Welcome to the repository! This appears to be your first issue here. ${response}`;
            }
            
            // Post comment
            if (response) {
              await github.rest.issues.createComment({
                owner: repo.owner,
                repo: repo.repo,
                issue_number: issue.number,
                body: response
              });
            }
            
            // Set milestone for high/critical priority
            if (labels.includes('priority-high') || labels.includes('priority-critical')) {
              // Check if milestone exists
              const milestones = await github.rest.issues.listMilestones({
                owner: repo.owner,
                repo: repo.repo,
                state: 'open'
              });
              
              const v1Milestone = milestones.data.find(m => m.title === 'v1.0.0');
              if (v1Milestone) {
                await github.rest.issues.update({
                  owner: repo.owner,
                  repo: repo.repo,
                  issue_number: issue.number,
                  milestone: v1Milestone.number
                });
              } else {
                // Create milestone if it doesn't exist
                const newMilestone = await github.rest.issues.createMilestone({
                  owner: repo.owner,
                  repo: repo.repo,
                  title: 'v1.0.0',
                  state: 'open'
                });
                
                await github.rest.issues.update({
                  owner: repo.owner,
                  repo: repo.repo,
                  issue_number: issue.number,
                  milestone: newMilestone.data.number
                });
              }
            }
            
            // Update status from needs-triage to needs-review
            await github.rest.issues.removeLabel({
              owner: repo.owner,
              repo: repo.repo,
              issue_number: issue.number,
              name: 'needs-triage'
            });
            
            await github.rest.issues.addLabels({
              owner: repo.owner,
              repo: repo.repo,
              issue_number: issue.number,
              labels: ['needs-review']
            });